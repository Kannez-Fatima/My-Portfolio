<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Shop Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg,#0F172A,#1E293B);
  color:#E2E8F0;
}

/* Glass card */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding:20px;
  transition:0.3s;
}
.glass:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(99,102,241,0.4);
}

/* Button */
.btn {
  background: linear-gradient(45deg,#3B82F6,#8B5CF6);
  padding:8px 15px;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #6366F1;
}

/* Payment buttons */
.pay-btn {
  padding:10px;
  border-radius:8px;
  background:#1E293B;
  cursor:pointer;
  transition:0.3s;
}
.pay-btn:hover {
  background: linear-gradient(45deg,#3B82F6,#8B5CF6);
}
.pay-btn.active {
  background: linear-gradient(45deg,#3B82F6,#8B5CF6);
}

/* Inputs */
input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  background:#0F172A;
  border:1px solid #334155;
}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl mb-6 text-center">🛒 My Shop</h1>

<!-- PRODUCTS -->
<div class="grid md:grid-cols-3 gap-4">

  <div class="glass">
    <h2>Women Dress</h2>
    <p>$40</p>
    <div class="btn" onclick="addToCart('Dress',40)">Add to Cart</div>
  </div>

  <div class="glass">
    <h2>Bottle</h2>
    <p>$12</p>
    <div class="btn" onclick="addToCart('Bottle',12)">Add</div>
  </div>

  <div class="glass">
    <h2>Jewelry</h2>
    <p>$60</p>
    <div class="btn" onclick="addToCart('Jewelry',60)">Add</div>
  </div>

  <div class="glass">
    <h2>Makeup</h2>
    <p>$30</p>
    <div class="btn" onclick="addToCart('Makeup',30)">Add</div>
  </div>

  <div class="glass">
    <h2>EarPods</h2>
    <p>$120</p>
    <div class="btn" onclick="addToCart('EarPods',120)">Add</div>
  </div>

  <div class="glass">
    <h2>iPad</h2>
    <p>$400</p>
    <div class="btn" onclick="addToCart('iPad',400)">Add</div>
  </div>

</div>

<!-- CART -->
<div class="glass mt-8 max-w-xl mx-auto">
  <h2 class="text-xl mb-3">Cart</h2>
  <ul id="cart-items"></ul>
  <p class="mt-3 text-lg">Total: $<span id="total">0</span></p>
</div>

<!-- PAYMENT -->
<div class="glass mt-6 max-w-xl mx-auto">
  <h2 class="text-xl mb-3">Payment Method</h2>

  <div class="grid grid-cols-3 gap-3 mb-4">
    <div class="pay-btn active" onclick="selectMethod('card',this)">Card</div>
    <div class="pay-btn" onclick="selectMethod('paypal',this)">PayPal</div>
    <div class="pay-btn" onclick="selectMethod('easypaisa',this)">Easypaisa</div>
    <div class="pay-btn" onclick="selectMethod('jazzcash',this)">JazzCash</div>
    <div class="pay-btn" onclick="selectMethod('bank',this)">Bank</div>
  </div>

  <div id="forms">

    <div id="card" class="method">
      <input placeholder="Card Number">
      <input placeholder="Expiry Date">
      <input placeholder="CVV">
    </div>

    <div id="paypal" class="method hidden">
      <input placeholder="PayPal Email">
    </div>

    <div id="easypaisa" class="method hidden">
      <input placeholder="Easypaisa Number">
    </div>

    <div id="jazzcash" class="method hidden">
      <input placeholder="JazzCash Number">
    </div>

    <div id="bank" class="method hidden">
      <input placeholder="Account Number">
      <input placeholder="Bank Name">
    </div>

  </div>

  <button class="btn w-full mt-4">Complete Payment</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += price;
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.name + " - $" + item.price;
    list.appendChild(li);
  });

  document.getElementById("total").textContent = total;
}

function selectMethod(method, el) {
  document.querySelectorAll('.pay-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');

  document.querySelectorAll('.method').forEach(m => m.classList.add('hidden'));
  document.getElementById(method).classList.remove('hidden');
}
</script>

</body>
</html>
