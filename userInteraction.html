<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extreme Interactive UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    body { cursor: none; }

    .cursor {
      width: 20px;
      height: 20px;
      border: 2px solid #a855f7;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
      z-index: 9999;
    }

    .cursor-follower {
      width: 40px;
      height: 40px;
      background: rgba(168,85,247,0.2);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9998;
    }
  </style>
</head>
<body class="bg-black text-white overflow-x-hidden">

  <!-- Custom Cursor -->
  <div class="cursor"></div>
  <div class="cursor-follower"></div>

  <!-- Hero -->
  <section class="h-screen flex flex-col justify-center items-center text-center">
    <h1 class="text-6xl font-extrabold mb-6">Next Level UI</h1>
    <p class="text-gray-400">Move your mouse & feel the experience</p>
  </section>

  <!-- Interactive Cards -->
  <section class="h-screen flex justify-center items-center gap-10">
    <div class="card w-64 h-80 bg-gradient-to-br from-purple-600 to-indigo-700 rounded-3xl flex items-center justify-center text-2xl font-bold">UI</div>
    <div class="card w-64 h-80 bg-gradient-to-br from-pink-600 to-red-600 rounded-3xl flex items-center justify-center text-2xl font-bold">UX</div>
    <div class="card w-64 h-80 bg-gradient-to-br from-green-500 to-teal-600 rounded-3xl flex items-center justify-center text-2xl font-bold">Motion</div>
  </section>

  <script>
    const cursor = document.querySelector('.cursor');
    const follower = document.querySelector('.cursor-follower');

    document.addEventListener('mousemove', (e) => {
      gsap.to(cursor, { x: e.clientX, y: e.clientY });
      gsap.to(follower, { x: e.clientX, y: e.clientY, duration: 0.3 });
    });

    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateX = (y / rect.height - 0.5) * 20;
        const rotateY = (x / rect.width - 0.5) * -20;

        gsap.to(card, {
          rotateX: rotateX,
          rotateY: rotateY,
          transformPerspective: 500,
          ease: "power2.out"
        });
      });

      card.addEventListener('mouseleave', () => {
        gsap.to(card, { rotateX: 0, rotateY: 0 });
      });
    });

    gsap.utils.toArray("section").forEach(section => {
      gsap.from(section, {
        opacity: 0,
        y: 100,
        duration: 1,
        scrollTrigger: {
          trigger: section,
          start: "top 80%",
        }
      });
    });

  </script>

</body>
</html>
