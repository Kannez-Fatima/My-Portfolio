<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-900 text-white">

<div class="bg-white/10 p-6 rounded">
    <h2 class="text-xl mb-4">Login</h2>

    <input id="user" class="block mb-2 p-2 text-black" placeholder="Username">
    <input id="pass" type="password" class="block mb-2 p-2 text-black" placeholder="Password">

    <button onclick="login()" class="bg-purple-600 px-4 py-2">Login</button>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u && p){
        localStorage.setItem("user", u);
        window.location.href = "index.html";
    } else {
        alert("Enter details");
    }
}
</script>

</body>
</html>
